- name: "frontend"
  hosts: "projectprac.fun"
  become: yes
  tasks: 
    - name: "disable nginx"
      ansible.builtin.command:
        dnf module disable nginx -y
    
    - name: "Enable specific nginx version"
      ansible.builtin.command:
        dnf module enable nginx:1.24 -y 

    - name: "Install nginx"
      ansible.builtin.dnf:
        name: "nginx"
        state: "present"
    
    - name: "nginx service start"
      ansible.builtin.service:
        name: "nginx"
        state: "started"
        enabled: yes

    - name: "Remove the default web file" 
      ansible.builtin.file:
        path: "/usr/share/nginx/html"
        state: "absent" 

    - name: "create the html file"
      ansible.builtin.file:
        path: "/usr/share/nginx/html" 
        state: "directory"
    
    - name: "Download the frontend content"
      ansible.builtin.get_url:
        url: "https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip"
        dest: "/tmp/frontend.zip"

    - name: "Unarchive the frontend content"
      ansible.builtin.unarchive:
        src: "/tmp/frontend.zip"
        dest: "/usr/share/nginx/html"

    - name: "remove the default nginx configuration"
      ansible.builtin.file:
        path: "/etc/nginx/nginx.conf"
        state: "absent"
    
    - name: "adding nginx configuration"
      ansible.builtin.copy:
       src: "/home/ec2-user/nginx.conf"
       dest: "/etc/nginx/nginx.conf"
    
    - name: "Restart nginx service"
      ansible.builtin.service:
        name: "nginx"
        state: "restarted"




