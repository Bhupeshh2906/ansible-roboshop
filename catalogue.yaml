- name: "Catalogue"
  hosts: "catalogue.projectprac.fun"
  become: yes
  tasks:
    - name: "Disable the nodejs module"
      ansible.builtin.command:
        dnf module disable nodejs -y
    
    - name: "Enable the specific nodejs module"
      ansible.builtin.command:
        dnf module enable nodejs:20 -y
    
    - name: "Install nodejs"
      ansible.builtin.dnf:
        name: "nodejs"
        state: "present"
    
    - name: "Creating the system user"
      ansible.builtin.user:
        name: "roboshop"
        state: "present"
        home: "/app"
        shell: "/sbin/nologin"
        system: true
        comment: "roboshop system user"
    
    - name: "creating /app"
      ansible.builtin.file:
        path: "/app"
        state: directory
    
    - name: "Downloading catalogue content"
      ansible.builtin.get_url:
        url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
        dest: "/tmp/catalogue.zip"
    
    - name: "unarchive the catalogue file"
      ansible.builtin.unarchive:
        src: "/tmp/catalogue.zip"
        dest: "/app"
        remote_src: yes
    
    - name: Install Node.js dependencies
      ansible.builtin.npm:
        path: /app


    - name: "Adding catalogue service configuration"
      ansible.builtin.copy:
        src: "catalogue.service"
        dest: "/etc/systemd/system/catalogue.service"

    - name: "reload the catalogue.service"
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: "Start and enable the catalogue service"
      ansible.builtin.service: 
        name: "catalogue" 
        state: "started"
        enabled: yes
    
    - name: "configure mongodb.repo"
      ansible.builtin.copy:
        src: "mongodb.repo"
        dest: "/etc/yum.repos.d/mongodb.repo"

    - name: "install mongodb client"
      ansible.builtin.dnf:
        name: "mongodb-mongosh"
        state: "present" 

    - name: "check products loaded or not"
      ansible.builtin.command:
         mongosh --host 98.93.55.55 --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: mongo_output

    - name: "print mongo output"
      ansible.builtin.debug:
        msg: "{{ mongo_output }}"

    - name: "Load the products into db "
      ansible.builtin.shell:
        mongosh --host 98.93.55.55 </app/db/master-data.js 
      when:
        mongo_output.stdout | int < 0        